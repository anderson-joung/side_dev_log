<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>이번 달까지만 버텨주세요 / Please Let Us Survive This Month</title>
  <style>
    :root {
      --bg: #eef3f7;
      --paper: rgba(255,255,255,0.92);
      --paper-solid: #ffffff;
      --ink: #1f2b34;
      --muted: #61727d;
      --line: #d6e0e7;
      --line-strong: #b9c7d0;
      --shadow: 0 16px 42px rgba(40,54,68,0.14);
      --shadow-soft: 0 8px 22px rgba(40,54,68,0.10);
      --blue: #2f80ed;
      --blue-soft: #e7f1ff;
      --green: #1e9e62;
      --green-soft: #e8f7ef;
      --orange: #d98718;
      --orange-soft: #fff3df;
      --red: #cf3e3e;
      --red-soft: #ffe8e8;
      --violet: #7657d6;
      --violet-soft: #f0edff;
      --dark: #18242c;
    }

    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 0%, rgba(255,255,255,0.95), rgba(238,243,247,0.82) 38%, rgba(222,232,240,1) 100%);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      user-select: none;
    }

    button {
      font: inherit;
      color: inherit;
      border: 1px solid var(--line-strong);
      border-radius: 14px;
      background: linear-gradient(180deg, #fff, #eff5f9);
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), var(--shadow-soft);
      transition: transform 100ms ease, filter 100ms ease, box-shadow 100ms ease, border-color 100ms ease;
    }
    button:hover { filter: brightness(1.02); border-color: #91a9b8; }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: 0.45; cursor: not-allowed; filter: grayscale(0.25); box-shadow: none; }

    #app {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .topbar {
      z-index: 20;
      display: grid;
      grid-template-columns: 260px minmax(0,1fr) 318px;
      gap: 12px;
      padding: 10px 14px 9px;
      background: rgba(248,251,253,0.88);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 8px 26px rgba(49,66,82,0.08);
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .brand-badge {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #ffffff, #dfeaf2);
      border: 1px solid var(--line-strong);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }
    .brand-badge img { width: 34px; height: 34px; object-fit: contain; }
    .brand-title strong { display: block; font-size: 15px; line-height: 1.05; letter-spacing: -0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand-title span { display: block; margin-top: 3px; color: var(--muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .top-center { display: grid; grid-template-rows: 40px auto; gap: 7px; min-width: 0; }
    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 0;
    }
    .clock, .survival-pill, .route-pill {
      height: 38px;
      display: flex;
      align-items: center;
      padding: 0 13px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: rgba(255,255,255,0.86);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.95);
      font-size: 12px;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .survival-pill { color: var(--green); font-weight: 800; }
    .survival-pill.warn { color: var(--orange); background: var(--orange-soft); border-color: rgba(217,135,24,0.35); }
    .survival-pill.bad { color: var(--red); background: var(--red-soft); border-color: rgba(207,62,62,0.38); }
    .route-pill { color: var(--ink); max-width: 210px; overflow: hidden; text-overflow: ellipsis; }

    .resource-strip {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 5px;
    }
    .resource-card {
      min-width: 0;
      padding: 7px 9px 6px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,0.88);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.95);
      text-align: center;
    }
    .resource-card label {
      display: block;
      font-size: 9px;
      line-height: 1;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .resource-card strong {
      display: block;
      margin-top: 4px;
      font-size: 14px;
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-variant-numeric: tabular-nums;
    }
    .resource-card small {
      display: block;
      margin-top: 3px;
      font-size: 9px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .positive { color: var(--green); }
    .negative { color: var(--red); }
    .warning { color: var(--orange); }
    .blue { color: var(--ink); }
    .violet { color: var(--ink); }
    .ink { color: var(--text); }
    .delta-critical { color: var(--red); }
    .delta-warn { color: var(--orange); }
    .resource-card small.positive, .resource-card small.negative, .resource-card small.warning, .resource-card small.delta-critical, .resource-card small.delta-warn, .resource-card small.ink { font-weight: 700; }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
    }
    .speed-btn, .small-btn {
      height: 38px;
      min-width: 43px;
      padding: 0 10px;
      font-size: 12px;
      border-radius: 12px;
    }
    .speed-btn.active { border-color: var(--line-strong); color: var(--ink); background: #f8fbfd; }
    .small-btn.danger { border-color: rgba(207,62,62,0.35); color: var(--red); background: var(--red-soft); }

    .game-shell {
      min-height: 0;
      display: grid;
      grid-template-columns: 218px minmax(0, 1fr) 250px;
      gap: 12px;
      padding: 12px;
    }

    .left-rail, .right-rail {
      min-height: 0;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #b9c7d0 transparent;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255,255,255,0.74);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .left-rail { padding: 12px; }
    .right-rail { padding: 12px; }

    .rail-section + .rail-section { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--line); }
    .rail-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 8px;
      margin: 0 2px 9px;
    }
    .rail-title strong { font-size: 12px; letter-spacing: -0.01em; }
    .rail-title span { color: var(--muted); font-size: 10px; white-space: nowrap; }

    .room-nav {
      display: grid;
      gap: 7px;
    }
    .room-btn {
      width: 100%;
      min-height: 50px;
      display: grid;
      grid-template-columns: 40px minmax(0,1fr);
      align-items: center;
      gap: 8px;
      padding: 7px;
      text-align: left;
      border-radius: 16px;
    }
    .room-btn.active {
      border-color: rgba(47,128,237,0.55);
      background: linear-gradient(180deg, #f8fbff, #e7f1ff);
      box-shadow: 0 0 0 2px rgba(47,128,237,0.08), var(--shadow-soft);
    }
    .nav-icon {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 13px;
      background: rgba(255,255,255,0.75);
      border: 1px solid var(--line);
      overflow: hidden;
    }
    .nav-icon img { width: 34px; height: 34px; object-fit: contain; }
    .room-btn b { display: block; font-size: 12px; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .room-btn small { display: block; margin-top: 3px; color: var(--muted); font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .action-list { display: grid; gap: 7px; }
    .action-card {
      position: relative;
      min-height: 60px;
      display: grid;
      grid-template-columns: 42px minmax(0,1fr) 42px;
      align-items: center;
      gap: 8px;
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.78);
      box-shadow: var(--shadow-soft);
    }
    .action-card.hot { background: linear-gradient(180deg, #fff, #fff1f1); border-color: rgba(207,62,62,0.25); }
    .action-card.cold { background: linear-gradient(180deg, #fff, #eef7ff); border-color: rgba(47,128,237,0.20); }
    .action-icon { width: 42px; height: 42px; border-radius: 14px; background: rgba(255,255,255,0.85); border: 1px solid var(--line); display: grid; place-items: center; overflow: hidden; }
    .action-icon img { width: 37px; height: 37px; object-fit: contain; }
    .action-name { font-weight: 850; font-size: 12px; line-height: 1.1; }
    .action-sub { margin-top: 3px; font-size: 10px; color: var(--muted); line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .action-card button {
      width: 42px;
      height: 42px;
      padding: 0;
      border-radius: 14px;
      font-size: 11px;
      font-weight: 800;
      box-shadow: none;
    }
    .cooldown-bar { position: absolute; left: 10px; right: 10px; bottom: 4px; height: 3px; background: rgba(31,43,52,0.08); border-radius: 999px; overflow: hidden; }
    .cooldown-fill { height: 100%; background: linear-gradient(90deg, var(--orange), var(--red)); width: 0%; }

    .stage-panel {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: #f7fafc;
      box-shadow: var(--shadow);
    }
    #roomStage { position: absolute; inset: 0; overflow: hidden; background-image: var(--room-bg); background-size: cover; background-position: center; background-repeat: no-repeat; }
    .room-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; transform: scale(1.01); }
    .room-shade {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(255,255,255,0.18), rgba(255,255,255,0.05) 45%, rgba(0,0,0,0.22));
      pointer-events: none;
    }
    .room-shade.light {
      background: linear-gradient(180deg, rgba(255,255,255,0.80), rgba(255,255,255,0.38) 45%, rgba(255,255,255,0.1));
      backdrop-filter: blur(1px);
    }
    .room-title-card {
      position: absolute;
      left: 18px;
      top: 18px;
      max-width: min(460px, calc(100% - 36px));
      padding: 13px 15px;
      border: 1px solid rgba(255,255,255,0.62);
      border-radius: 20px;
      background: rgba(255,255,255,0.78);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .room-title-card h1 { margin: 0; font-size: 22px; line-height: 1.05; letter-spacing: -0.04em; }
    .room-title-card p { margin: 7px 0 0; font-size: 12px; color: var(--muted); line-height: 1.4; }

    .room-kpis {
      position: absolute;
      right: 18px;
      top: 18px;
      display: grid;
      grid-template-columns: repeat(2, minmax(110px, auto));
      gap: 7px;
    }
    .floating-kpi {
      padding: 9px 11px;
      border: 1px solid rgba(255,255,255,0.65);
      border-radius: 16px;
      background: rgba(255,255,255,0.76);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(10px);
      font-size: 11px;
    }
    .floating-kpi label { display: block; color: var(--muted); font-size: 9px; }
    .floating-kpi strong { display: block; margin-top: 3px; font-size: 14px; font-variant-numeric: tabular-nums; }

    .field-floor {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 9px;
    }
    .floor-card {
      min-height: 92px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.62);
      border-radius: 20px;
      background: rgba(255,255,255,0.78);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(10px);
    }
    .floor-card b { display: block; font-size: 13px; }
    .floor-card span { display: block; margin-top: 5px; color: var(--muted); font-size: 11px; line-height: 1.35; }
    .mini-progress { margin-top: 10px; height: 8px; border-radius: 999px; background: rgba(31,43,52,0.08); overflow: hidden; }
    .mini-progress > i { display: block; height: 100%; border-radius: 999px; background: linear-gradient(90deg, #6cb7ff, #77d696); width: 40%; }

    .assembly-board {
      max-width: 86%;
      margin: 0 auto;
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 22px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .batch-column {
      background: rgba(255,255,255,0.82);
      min-height: 320px;
      display: grid;
      grid-template-rows: auto minmax(0,1fr) auto;
      gap: 10px;
      padding: 14px;
      border: 1px solid rgba(188,201,211,0.75);
      border-radius: 24px;
      background: rgba(255,255,255,0.84);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }
    .batch-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .batch-head b { font-size: 14px; letter-spacing: -0.02em; }
    .batch-head em { font-style: normal; font-size: 12px; font-weight: 850; color: var(--ink); }
    .machine-grid {
      gap: 6px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 8px;
      align-content: start;
    }
    .machine-cell {
      min-height: 24px;
      font-size: 11px;
      aspect-ratio: 1 / 0.72;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f1f5f8;
      display: grid;
      place-items: center;
      color: #9aa8b1;
      font-size: 11px;
      font-weight: 800;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }
    .machine-cell.done { background: var(--green-soft); color: var(--green); border-color: rgba(30,158,98,0.25); }
    .machine-cell.work { background: var(--orange-soft); color: var(--orange); border-color: rgba(217,135,24,0.35); animation: pulse 1.1s infinite ease-in-out; }
    @keyframes pulse { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.04); } }
    .batch-note { color: var(--muted); font-size: 11px; line-height: 1.38; }

    .room-hero {
      position: absolute;
      left: 28px;
      bottom: 28px;
      width: min(420px, 44%);
      padding: 22px;
      border: 1px solid rgba(188,201,211,0.75);
      border-radius: 28px;
      background: rgba(255,255,255,0.86);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }
    .room-hero img { width: 100%; max-height: 245px; object-fit: contain; display: block; }
    .room-hero h2 { margin: 12px 0 0; font-size: 18px; letter-spacing: -0.03em; }
    .room-hero p { margin: 7px 0 0; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .desk-metrics {
      position: absolute;
      right: 24px;
      bottom: 24px;
      width: min(470px, 46%);
      display: grid;
      gap: 10px;
    }
    .metric-strip {
      display: grid;
      grid-template-columns: 62px minmax(0,1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border: 1px solid rgba(188,201,211,0.75);
      border-radius: 20px;
      background: rgba(255,255,255,0.86);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(12px);
    }
    .metric-strip img { width: 50px; height: 50px; object-fit: contain; }
    .metric-strip b { display: block; font-size: 13px; }
    .metric-strip span { display: block; margin-top: 3px; font-size: 11px; color: var(--muted); }
    .metric-strip strong { font-size: 14px; font-variant-numeric: tabular-nums; white-space: nowrap; }



    .worker-layer {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }
    .worker {
      position: absolute;
      width: clamp(44px, 5.2vw, 86px);
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 10px 13px rgba(32,45,57,0.22));
      transform-origin: 50% 100%;
      opacity: 0.95;
      will-change: transform;
    }
    .worker-cat { animation: workerWalkA 7.8s infinite ease-in-out; }
    .worker-dog { animation: workerWalkB 8.8s infinite ease-in-out; }
    .worker-owl { animation: workerBob 3.4s infinite ease-in-out; }
    .room-field .worker-cat { left: 38%; top: 39%; }
    .room-field .worker-dog { left: 49%; top: 53%; width: clamp(46px, 5.8vw, 92px); }
    .room-field .worker-owl { left: 62%; top: 55%; }
    .room-assembly .worker-cat { left: 18%; top: 48%; }
    .room-assembly .worker-dog { left: 50%; top: 31%; width: clamp(46px, 5.8vw, 92px); }
    .room-assembly .worker-owl { left: 74%; top: 47%; }
    .room-office .worker-cat { left: 44%; top: 42%; }
    .room-office .worker-dog { left: 24%; top: 54%; width: clamp(46px, 5.8vw, 92px); }
    .room-office .worker-owl { left: 68%; top: 54%; }
    .room-design .worker-cat { left: 30%; top: 53%; }
    .room-design .worker-dog { left: 54%; top: 37%; width: clamp(46px, 5.8vw, 92px); }
    .room-design .worker-owl { left: 72%; top: 51%; }
    @keyframes workerBob {
      0%, 100% { transform: translate3d(0,0,0) scale(1); }
      50% { transform: translate3d(0,-7px,0) scale(1.015); }
    }
    @keyframes workerWalkA {
      0%, 100% { transform: translate3d(-5px,0,0) rotate(-1deg); }
      40% { transform: translate3d(10px,-4px,0) rotate(1deg); }
      70% { transform: translate3d(4px,1px,0) rotate(0deg); }
    }
    @keyframes workerWalkB {
      0%, 100% { transform: translate3d(8px,0,0) rotate(1deg); }
      45% { transform: translate3d(-12px,-5px,0) rotate(-1deg); }
      72% { transform: translate3d(-4px,1px,0) rotate(0deg); }
    }


    .worker-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .worker-sprite {
      position: absolute;
      width: clamp(54px, 6.6vw, 105px);
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 14px 14px rgba(31,43,52,0.18));
      transform-origin: 50% 100%;
      opacity: 0.94;
    }
    .worker-sprite.cat { animation: workerBob 2.7s ease-in-out infinite; }
    .worker-sprite.dog { animation: workerWalk 5.2s ease-in-out infinite; }
    .worker-sprite.owl { animation: workerLook 3.8s ease-in-out infinite; }
    @keyframes workerBob { 0%,100%{ transform: translateY(0) rotate(-1deg); } 50%{ transform: translateY(-7px) rotate(1deg); } }
    @keyframes workerWalk { 0%,100%{ transform: translateX(-8px) translateY(0); } 50%{ transform: translateX(10px) translateY(-4px); } }
    @keyframes workerLook { 0%,100%{ transform: translateY(0) scaleX(1); } 35%{ transform: translateY(-4px) scaleX(1.03); } 70%{ transform: translateY(0) scaleX(0.98); } }

    .event-banner {
      position: absolute;
      left: 50%;
      top: 92px;
      transform: translateX(-50%) translateY(-6px);
      max-width: min(620px, calc(100% - 40px));
      padding: 12px 16px;
      border: 1px solid rgba(207,62,62,0.35);
      border-radius: 20px;
      background: rgba(255,241,241,0.92);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      color: var(--red);
      text-align: center;
      font-weight: 900;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      z-index: 12;
    }
    .event-banner.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .event-banner small { display: block; margin-top: 3px; color: #9c4545; font-size: 11px; font-weight: 650; }

    .toast-log { position: absolute; left: 18px; bottom: 18px; width: min(440px, calc(100% - 36px)); z-index: 11; pointer-events: none; }
    .toast {
      margin-top: 7px;
      padding: 8px 11px;
      border: 1px solid rgba(185,199,208,0.8);
      border-radius: 14px;
      background: rgba(255,255,255,0.86);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(10px);
      font-size: 11px;
      color: var(--ink);
      animation: toastIn 220ms ease;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .panel-card {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,0.82);
      box-shadow: var(--shadow-soft);
      margin-bottom: 10px;
    }
    .panel-card h3 { margin: 0; font-size: 14px; letter-spacing: -0.03em; }
    .panel-card p { margin: 6px 0 0; color: var(--muted); font-size: 11px; line-height: 1.45; }

    if (abs >= 10_000) return `${sign}${(abs / 10_000).toFixed(0)}만`;

    return Math.round((calcDailyOperatingCost() + calcInterestDaily() + state.payables * 0.038) * 30);
  }
  function estimateNetMonthlyOutflow() {
    const grossOut = calcDailyOperatingCost() + calcInterestDaily() + state.payables * 0.038;
    const grossIn = Math.min(state.receivables, state.receivables * calcCollectionRate()) + calcDailyOrders() * 0.08;
    return Math.round((grossOut - grossIn) * 30);
  }
  function estimateMonthlyBurn() {
    return estimateMonthlyCost();
  }
  function calcSurvivalDays() {
    const burn = state.lastBurn || estimateNetMonthlyOutflow();
    if (burn <= 0) return 999;
    return Math.floor(state.cash / (burn / 30));
  }
  function calcAssemblyRate() {
    const skill = 0.72 + deptLevel("factory") * 0.16 + deptLevel("office") * 0.15 + deptLevel("design") * 0.07 + deptLevel("api") * 0.045;
    const human = 0.55 + state.morale / 180 + state.safety / 220 - Math.max(0, state.pressure - 55) / 210;
    const watched = state.currentRoom === "assembly" ? 1.10 : 0.88;
    return clamp(skill * human * watched, 0.20, 3.2);
  }
  function calcDefectRate() {
    return clamp(0.067 + Math.max(0, state.pressure - 55) / 520 + Math.max(0, 65 - state.safety) / 520 - deptLevel("design") * 0.009 - deptLevel("api") * 0.004, 0.018, 0.21);
  }
  function assemblyDone() { return assemblyWip(); }
  function assemblyWip() {
    const a = state.assembly;
    return (a.frame || 0) + (a.plc || 0) + (a.assy || 0) + (a.qc || 0) + (a.idle || 0);
  }
  function assemblyMonthlyCap() { return (state.assembly.rushDays || 0) > 0 ? state.assembly.monthlyCapRush : state.assembly.monthlyCapBase; }
  function normalizeOrderBalance(targetState = state) {
    const a = targetState?.assembly;
    if (!a) return;
    a.orderBacklog = Math.max(0, Math.round(a.orderBacklog || 0));
    a.frame = Math.max(0, Math.round(a.frame || 0));
    a.assy = Math.max(0, Math.round(a.assy || 0));
    a.plc = Math.max(0, Math.round(a.plc || 0));
    a.qc = Math.max(0, Math.round(a.qc || 0));
    a.idle = Math.max(0, Math.round(a.idle || 0));
    const started = a.frame + a.assy + a.plc + a.qc + a.idle;
    // v4.4.13 displayed already-started orders as remaining orders.
    // Migrate only that old double-counted baseline, so new incoming orders still stay visible.
    if (!a.orderBacklogNormalized && a.orderBacklog >= 12 && started >= 12) {
      a.orderBacklog = Math.max(0, a.orderBacklog - Math.min(12, a.orderBacklog));
    }
    a.orderBacklogNormalized = true;
  }
  function equipmentUnitPrice() {
    const pressure = Math.min(0.08, (state.flags?.pricePressure || 0) * 0.02);
    return Math.round(rand(50_000_000, 70_000_000) * (1 - pressure));
  }
  function equipmentCostFromSales(value) {
    const ratio = clamp(0.75 + rand(-0.05, 0.05), 0.70, 0.80);
    return Math.round(value * ratio);
  }
  function ownerNetMonthly(salary) {
    const ratio = salary >= 10_000_000 ? 0.725 : salary >= 8_000_000 ? 0.755 : 0.79;
    return Math.round(salary * ratio);
  }
  function ownerMonthlySaving(salary) {
    return Math.max(0, ownerNetMonthly(salary) - 3_500_000);
  }
  function companyFullName() {
    const c = state.company || { prefix: "", core: "A", suffix: "" };
    return `(주)${c.core || "A"}${c.prefix || ""}${c.suffix || ""}`.replace(/\s+/g, "").trim();
  }

  function dateForDay(day = state.day) { const d = new Date(START_DATE.getTime()); d.setDate(START_DATE.getDate() + day - 1); return d; }
  function timeHM(mins) { return `${String(Math.floor(mins/60)).padStart(2,"0")}:${String(mins%60).padStart(2,"0")}`; }
  function shiftEndMinutes() { return state.workShift?.end || 19 * 60; }
  function setOvertime(hour, reason="잔업") { const end = hour * 60; if (!state.workShift || end > shiftEndMinutes()) state.workShift = { end, reason, saturday:false }; }
  function planWorkShift() {
    const d = dateForDay(); const dow = d.getDay(); const a = state.assembly || {};
    let end = 19 * 60, reason = "정상근무", saturday = false;
    if ((a.orderBacklog||0) >= 8 || (a.rework||0) >= 4 || (a.rushDays||0) > 0 || state.flags?.orderMishap) { end = 21 * 60; reason = "잔업"; }
    if ((a.orderBacklog||0) >= 12 || state.flags?.orderMishapHard) { end = 24 * 60; reason = "철야"; }
    if (dow === 6) { saturday = ((a.orderBacklog||0) >= 7) || Math.random() < 0.25; reason = saturday ? "토요근무" : "토요휴무"; end = saturday ? Math.max(end, 18 * 60) : 9 * 60; }
    if (dow === 0) { reason = "휴무"; end = 9 * 60; }
    state.workShift = { end, reason, saturday };
    if (state.flags) { state.flags.orderMishap = false; state.flags.orderMishapHard = false; }
  }
  function workStatusText() {
    if (state.workShift?.reason === "휴무" || state.workShift?.reason === "토요휴무") return state.workShift.reason;
    if (state.minutes >= 12 * 60 + 30 && state.minutes < 13 * 60 + 30) return "점심";
    if (shiftEndMinutes() >= 24 * 60) return "철야";
    if (shiftEndMinutes() > 19 * 60) return `잔업 ${timeHM(shiftEndMinutes())}까지`;
    return "19시 퇴근";
  }
  function dateText() {
    const d = dateForDay(); const h = Math.floor(state.minutes / 60); const m = state.minutes % 60;
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")} ${DAY_NAMES[d.getDay()]} ${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")} · ${workStatusText()}`;
  }
  function advanceHour() {
    if (state.flags.gameOver || state.flags.stabilized || modalOpen) return;
    if (!state.workShift) planWorkShift();
    if (state.workShift.reason === "휴무" || state.workShift.reason === "토요휴무") { state.day += 1; state.minutes = 9 * 60; planWorkShift(); renderDirty = true; return; }
    let newDay = false;
    state.minutes += 30;
    if (state.minutes === 12 * 60 + 30) state.minutes = 13 * 60 + 30;
    if (state.minutes >= shiftEndMinutes()) { dailyUpdate(); state.minutes = 9 * 60; state.day += 1; planWorkShift(); newDay = true; }
    if (newDay) renderDirty = true; else renderHUD();
  }

  function dailyUpdate() {
    const startCash = state.cash;
    const orders = Math.round(calcDailyOrders() * rand(0.84, 1.18));
    state.receivables += orders;
    state.financeFlow.sales += orders;
    state.financeFlow.cogs += Math.round(orders * clamp(0.75 + rand(-0.05, 0.05), 0.70, 0.80));
    if (Math.random() < clamp(orders / 90_000_000, 0.08, 0.45)) state.assembly.orderBacklog += 1;
    if ((state.assembly.orderBacklog || 0) > assemblyMonthlyCap()) { state.flags.orderMishap = true; state.assembly.rushDays = Math.max(state.assembly.rushDays || 0, 6); }

    let collected = Math.min(state.receivables, Math.round(state.receivables * calcCollectionRate() + deptLevel("finance") * 4_000_000));
    if (state.routeKey === "overseas" && state.day > 28) collected += Math.min(state.receivables - collected, 20_000_000 + deptLevel("api") * 3_000_000);
    state.receivables -= collected;
    state.cash += collected;

    const costBreakdown = calcDailyCostBreakdown(orders);
    const operatingCost = costBreakdown.payroll + costBreakdown.outsource + costBreakdown.overhead;
    state.cash -= operatingCost;

    const payableAccrual = Math.round(costBreakdown.materials + deptLevel("vendor") * 12_000_000);
    state.payables += payableAccrual;

    const apPayment = Math.min(state.payables, Math.round(state.payables * (0.032 + state.vendorTrust / 2400 + deptLevel("procurement") * 0.0025)));
    state.payables -= apPayment;
    state.cash -= apPayment;

    const interest = Math.round(calcInterestDaily());
    state.cash -= interest;

    state.financeFlow.weeklyIn += collected;
    state.financeFlow.weeklyOut += operatingCost + apPayment + interest;
    state.financeFlow.monthlyIn += collected;
    state.financeFlow.monthlyOut += operatingCost + apPayment + interest;
    state.financeFlow.payroll += costBreakdown.payroll;
    state.financeFlow.outsource += costBreakdown.outsource;
    state.financeFlow.vendors = (state.financeFlow.vendors || 0) + costBreakdown.vendors;
    state.financeFlow.snacks = (state.financeFlow.snacks || 0) + costBreakdown.snacks;
    state.financeFlow.admin = (state.financeFlow.admin || 0) + costBreakdown.admin;
    state.financeFlow.weeklyVendors = (state.financeFlow.weeklyVendors || 0) + costBreakdown.vendors;
    state.financeFlow.weeklySnacks = (state.financeFlow.weeklySnacks || 0) + costBreakdown.snacks;
    state.financeFlow.weeklyAdmin = (state.financeFlow.weeklyAdmin || 0) + costBreakdown.admin;
    state.financeFlow.materials += payableAccrual;
    state.financeFlow.overhead += costBreakdown.overhead;
    state.financeFlow.apPaid += apPayment;
    state.financeFlow.interest += interest;

    if (state.cash < -650_000_000) {
      const overdraft = Math.min(650_000_000, Math.abs(state.cash) * 0.62);
      state.debt += overdraft;
      state.cash += overdraft;
      state.legalRisk = clamp(state.legalRisk + 3, 0, 100);
      addToast(`당좌 차입 ${money(overdraft)}. 숨은 쉬지만 이자는 늘었다.`);
    }

    advanceAssembly();
    updateRiskPressure(orders, collected, operatingCost, payableAccrual, apPayment, interest);

    state.lastOrders = orders;
    state.lastCollected = collected;
    state.lastCosts = operatingCost + apPayment + interest;
    state.todayCashDelta = state.cash - startCash;
    state.lastDayCash = state.cash;
    state.lastBurn = Math.round(((operatingCost + apPayment + interest) - collected) * 30);
    state.monthProfit += state.todayCashDelta;

    for (const key of Object.keys(state.cooldowns)) state.cooldowns[key] = Math.max(0, state.cooldowns[key] - 1);
    if (state.assembly.rushDays > 0) state.assembly.rushDays -= 1;

    if (state.day === 3 && !state.flags.routeEventShown) {
      state.flags.routeEventShown = true;
      openRouteChoice();
      return;
    }
    if (state.day % 30 === 0) {
      forceMonthlyShipment();
      openMonthlyReport(true);
      return;
    }
    if (state.day % 7 === 0) {
      openWeeklyReport(true);
      return;
    }

    maybeUnlocks();
    progressOverseasMove();
    maybeCrisis();
    checkEndStates();
  }

  function syncIdleLots() {
    const a = state.assembly;
    a.idleLots = (a.idleLots || []).filter(l => l.qty > 0);
    a.idle = a.idleLots.reduce((sum, l) => sum + l.qty, 0);
  }
  function randomIdleDays() { return Math.floor(rand(3, 16)); }
  function pushIdleLot(qty = 1) {
    const a = state.assembly;
    a.idleLots = a.idleLots || [];
    a.idleLots.push({ qty, days: randomIdleDays() });
    syncIdleLots();
  }
  function advanceIdleLots() {
    const a = state.assembly;
    if ((!a.idleLots || !a.idleLots.length) && (a.idle || 0) > 0) a.idleLots = [{ qty: a.idle, days: randomIdleDays() }];
    a.idleLots = a.idleLots || [];
    for (const lot of a.idleLots) lot.days -= 1;
    for (const lot of a.idleLots) {
      if (lot.days > 0) continue;
      const canShip = Math.max(0, assemblyMonthlyCap() - (a.monthMade || 0));
      if (canShip <= 0) break;
      const qty = Math.min(lot.qty, canShip);
      if (qty > 0) { lot.qty -= qty; completeShipment(qty); }
    }
    a.idleLots = a.idleLots.filter(l => l.qty > 0);
    syncIdleLots();
  }
  function advanceAssembly() {
    normalizeOrderBalance(state);
    const a = state.assembly;
    a.lastMade = 0;
    a.assy ??= 0;
    syncIdleLots();
    advanceIdleLots();
    a.progress += calcAssemblyRate();
    let moves = 0;
    const start = { order: a.orderBacklog || 0, frame: a.frame || 0, plc: a.plc || 0, assy: a.assy || 0, qc: a.qc || 0 };
    while (a.progress >= 1 && moves < 10) {
      a.progress -= 1; moves += 1;
      if (start.qc > 0 && (a.idle || 0) < 12) {
        start.qc -= 1; a.qc -= 1;
        if (Math.random() < calcDefectRate()) { a.rework += 1; a.assy += 1; state.pressure = clamp(state.pressure + 0.7, 0, 100); }
        else pushIdleLot(1);
      } else if (start.assy > 0 && (a.qc || 0) < 12) {
        start.assy -= 1; a.assy -= 1; a.qc += 1;
      } else if (start.plc > 0 && (a.assy || 0) < 12) {
        start.plc -= 1; a.plc -= 1; a.assy += 1;
      } else if (start.frame > 0 && (a.plc || 0) < 12) {
        start.frame -= 1; a.frame -= 1; a.plc += 1;
      } else if (start.order > 0 && (a.frame || 0) < 12) {
        start.order -= 1; a.orderBacklog -= 1; a.frame += 1;
      } else break;
    }
  }

  function completeShipment(units = 1) {
    const unitValue = equipmentUnitPrice();
    const value = unitValue * units;
    const cogs = equipmentCostFromSales(value);
    const cashIn = Math.round(value * 0.20);
    const arIn = value - cashIn;
    state.cash += cashIn;
    state.receivables += arIn;
    state.payables += cogs;
    state.financeFlow.monthlyIn += cashIn;
    state.financeFlow.weeklyIn += cashIn;
    state.financeFlow.sales += value;
    state.financeFlow.cogs += cogs;
    state.reputation = clamp(state.reputation + 0.8, 0, 100);
    state.pressure = clamp(state.pressure - 0.8, 0, 100);
    state.assembly.shipments += units;
    state.assembly.monthMade += units;
    state.assembly.lastMade += units;
    flashBanner("출고", `완제품 ${units}대 / 현금 +${money(cashIn)} / 채권 +${money(arIn)}`);
    addToast(`완제품 ${units}대 출고. Idle 완료 후 15일 안에 처리됐다.`);
  }

  function forceMonthlyShipment() {
    const a = state.assembly;
    const target = assemblyMonthlyCap();
    let need = Math.max(0, target - (a.monthMade || 0));
    if (need <= 0) return;
    syncIdleLots();
    for (const lot of (a.idleLots || [])) {
      if (need <= 0) break;
      const qty = Math.min(lot.qty, need);
      lot.qty -= qty; need -= qty; completeShipment(qty);
    }
    a.idleLots = (a.idleLots || []).filter(l => l.qty > 0);
    syncIdleLots();
    while (need > 0 && (a.qc || 0) > 0) { a.qc -= 1; need -= 1; completeShipment(1); }
    while (need > 0 && (a.assy || 0) > 0) { a.assy -= 1; need -= 1; completeShipment(1); }
    while (need > 0 && (a.plc || 0) > 0) { a.plc -= 1; need -= 1; completeShipment(1); }
    while (need > 0 && (a.frame || 0) > 0) { a.frame -= 1; need -= 1; completeShipment(1); }
  }

  function updateRiskPressure(orders, collected, operatingCost, payableAccrual, apPayment, interest) {
    const arRatio = state.receivables / Math.max(1, orders * 12);
    const apRatio = state.payables / Math.max(1, apPayment * 18);
    const recovery = (state.morale > 65 ? 0.42 : 0) + (state.safety > 74 ? 0.38 : 0) + deptLevel("office") * 0.065 + deptLevel("api") * 0.05 + deptLevel("design") * 0.04;
    state.pressure = clamp(state.pressure + (state.lastBurn > 0 ? 0.48 : -0.36) + arRatio * 0.25 + apRatio * 0.27 - recovery, 0, 100);
    state.safety = clamp(state.safety - Math.max(0, state.pressure - 62) * 0.014 - Math.max(0, deptLevel("factory") - deptLevel("office")) * 0.045 + deptLevel("office") * 0.045 + deptLevel("procurement") * 0.018, 0, 100);
    state.morale = clamp(state.morale - Math.max(0, state.pressure - 60) * 0.015 + deptLevel("office") * 0.05 + deptLevel("api") * 0.018 - state.deaths * 0.01, 0, 100);
    state.reputation = clamp(state.reputation - Math.max(0, state.legalRisk - 68) * 0.01 + (orders > operatingCost ? 0.02 : -0.015), 0, 100);
    state.vendorTrust = clamp(state.vendorTrust + deptLevel("procurement") * 0.045 - Math.max(0, state.payables / 1_000_000_000 - 2) * 0.07, 0, 100);
    state.legalRisk = clamp(state.legalRisk + Math.max(0, state.pressure - 78) * 0.006 + Math.max(0, 45 - state.safety) * 0.008 - deptLevel("finance") * 0.025, 0, 55);
  }

  function maybeUnlocks() {
    if (!state.depts.vendor.unlocked && (deptLevel("sales") >= 3 || state.day > 21)) {
      state.depts.vendor.unlocked = true;
      flashBanner("대기업 벤더락 해금", "물량과 갑질이 한 패키지로 온다.");
      addToast("대기업 벤더락이 해금됐다. 안정과 족쇄가 같이 온다.");
    }
  }

  function applyBadLuck() {
    const chance = clamp(0.035 + state.pressure / 1800 + (state.assembly.orderBacklog || 0) / 500, 0.035, 0.14);
    if (Math.random() > chance) return false;
    const year = dateForDay().getFullYear();
    const month = dateForDay().getMonth() + 1;
    const pool = badLuckDefs.filter(e => {
      if (e.scheduled) return false;
      if (e.yearly && state.flags[e.yearly] === year) return false;
      if (e.semiAnnual && state.flags[e.semiAnnual] && state.day - state.flags[e.semiAnnual] < 180) return false;
      if (e.monthly && state.flags[`${e.monthly}_${year}_${month}`]) return false;
      return true;
    });
    if (!pool.length) return false;
    const e = pool[Math.floor(Math.random() * pool.length)];
    if (e.yearly) state.flags[e.yearly] = year;
    if (e.semiAnnual) state.flags[e.semiAnnual] = state.day;
    if (e.monthly) state.flags[`${e.monthly}_${year}_${month}`] = true;
    const cost = Math.round(e.cost());
    if (cost > 0) state.cash -= cost;
    state.pressure = clamp(state.pressure + (e.pressure || 0), 0, 100);
    state.morale = clamp(state.morale + (e.morale || 0), 0, 100);
    state.reputation = clamp(state.reputation + (e.reputation || 0), 0, 100);
    state.safety = clamp(state.safety + (e.safety || 0), 0, 100);
    state.legalRisk = clamp(state.legalRisk + (e.legal || 0), 0, 100);
    state.vendorTrust = clamp(state.vendorTrust + (e.vendor || 0), 0, 100);
    state.payables += e.ap || 0;
    if (e.pricePressure) state.flags.pricePressure = (state.flags.pricePressure || 0) + e.pricePressure;
    state.assembly.rework += e.rework || 0;
    state.assembly.orderBacklog += e.backlog || 0;
    if (e.overtime === 24) { state.flags.orderMishapHard = true; setOvertime(24, "철야"); }
    else if (e.overtime === 21) { state.flags.orderMishap = true; setOvertime(21, "잔업"); }
    state.financeFlow.weeklyOut += cost; state.financeFlow.monthlyOut += cost;
    if (e.bucket === "snacks") { state.financeFlow.snacks += cost; state.financeFlow.weeklySnacks = (state.financeFlow.weeklySnacks || 0) + cost; }
    else if (e.bucket === "vendors") { state.financeFlow.vendors = (state.financeFlow.vendors || 0) + cost; state.financeFlow.weeklyVendors = (state.financeFlow.weeklyVendors || 0) + cost; }
    else { state.financeFlow.admin = (state.financeFlow.admin || 0) + cost; state.financeFlow.weeklyAdmin = (state.financeFlow.weeklyAdmin || 0) + cost; }
    flashEvent(e.title, cost > 0 ? `${e.msg} 손실 -${money(cost)}` : `${e.msg} 신뢰도 하락`);
    addToast(`${e.title}: ${e.msg}`);
    return true;
  }

  function progressOverseasMove() {
    if (state.routeKey !== "overseas" || state.flags.overseasComplete || state.flags.gameOver) return;
    if (state.flags.overseasCountdown == null) state.flags.overseasCountdown = 540;
    state.flags.overseasCountdown -= 1;
    if (state.flags.overseasCountdown <= 0) {
      state.flags.overseasComplete = true;
      state.paused = true;
      roomDefs.field.name = "베트남 현장";
      roomDefs.assembly.name = "베트남 조립실";
      openEnding("해외 생산기지 이전 엔딩", "베트남 생산기지 이전에 성공했습니다. 현장과 조립 인건비는 크게 낮아졌지만, 중국산 저가 장비와의 싸움은 계속됩니다.");
    }
  }

  function maybeCrisis() {
    if (state.day >= (state.flags.nextAccidentDay || 120)) return openAccidentModal();
    const year = dateForDay().getFullYear();
    if (state.day >= (state.flags.nextSnackDay || 75)) {
      const e = badLuckDefs.find(x => x.scheduled === "snack");
      if (e) {
        state.flags.nextSnackDay = state.day + Math.floor(rand(60, 91));
        const cost = Math.round(e.cost());
        state.cash -= cost;
        state.financeFlow.snacks += cost;
        state.financeFlow.weeklySnacks += cost;
        state.financeFlow.weeklyOut += cost;
        state.financeFlow.monthlyOut += cost;
        flashEvent(e.title, `${e.msg} 비용 -${money(cost)}`);
        addToast(`${e.title}: ${e.msg}`);
        return;
      }
    }
    if (state.day > 60 && state.flags.chinaCopy !== year && Math.random() < 0.004) {
      const e = badLuckDefs.find(x => x.yearly === "chinaCopy");
      if (e) {
        state.flags.chinaCopy = year;
        state.flags.pricePressure = (state.flags.pricePressure || 0) + 1;
        const cost = Math.round(e.cost());
        state.cash -= cost;
        state.financeFlow.admin += cost; state.financeFlow.weeklyAdmin += cost; state.financeFlow.weeklyOut += cost; state.financeFlow.monthlyOut += cost;
        flashEvent(e.title, `${e.msg} 견적 손실 -${money(cost)}`);
        addToast(`${e.title}: ${e.msg}`);
        return;
      }
    }
    const legalRisk = Math.max(0, state.legalRisk - 42) * 0.0006;
    const vendorRisk = Math.max(0, 42 - state.vendorTrust) * 0.0018;
    const qualityRisk = Math.max(0, state.receivables / 1_000_000_000 - 3) * 0.0022 + Math.max(0, state.pressure - 74) * 0.0010 - deptLevel("design") * 0.0008;
    if (Math.random() < legalRisk) return legalAudit();
    if (Math.random() < vendorRisk) return vendorFreeze();
    if (Math.random() < qualityRisk) return qualityRecall();
    if (applyBadLuck()) return;
  }

  function scheduleNextAccident() {
    state.flags.nextAccidentDay = state.day + Math.floor(rand(90, 181));
  }
  function openAccidentModal() {
    state.paused = true;
    showModal(`<div class="modal-header"><h2>산재 발생</h2><p>현장에서 다쳤다. 깔끔하게 넘기려 해도 뜻대로 되지 않는다.</p></div>
      <div class="modal-body"><div class="choice-grid">
        <button class="choice-card" id="accidentSettle"><strong>합의 제안</strong><span>돈으로 빨리 정리하려 한다. 거부될 수 있다.</span><small>성공 시 빠른 종결 / 실패 시 산재처리</small></button>
        <button class="choice-card" id="accidentOfficial"><strong>산재처리</strong><span>공식 처리한다. 기록은 남지만 분쟁 리스크는 줄어든다.</span><small>현금 지출 / 분쟁 완화</small></button>
      </div></div>`);
    document.getElementById("accidentSettle").addEventListener("click", () => {
      closeModal();
      if (Math.random() < 0.45) { flashEvent("합의 거부", "노동자가 거부했습니다. 산재처리로 넘어갑니다."); industrialAccident(true); }
      else {
        const cost = Math.round(rand(25_000_000, 75_000_000));
        state.cash -= cost; state.legalRisk = clamp(state.legalRisk + 4, 0, 100); state.morale = clamp(state.morale - 4, 0, 100); state.incidents += 1;
        state.financeFlow.admin += cost; state.financeFlow.weeklyAdmin += cost; state.financeFlow.weeklyOut += cost; state.financeFlow.monthlyOut += cost;
        scheduleNextAccident();
        flashEvent("합의 완료", `합의금 -${money(cost)}. 기록은 적게 남았지만 사람들은 봤다.`);
        addToast(`산재 합의 처리. ${money(cost)} 지출.`);
      }
      renderDirty = true;
    });
    document.getElementById("accidentOfficial").addEventListener("click", () => { closeModal(); industrialAccident(true); renderDirty = true; });
  }

  function industrialAccident(official = false) {
    const fatal = Math.random() < clamp((62 - state.safety) / 160 + state.pressure / 520, 0.02, 0.12);
    const cost = Math.round((fatal ? 180_000_000 : 55_000_000) + state.incidents * 18_000_000);
    state.cash -= cost;
    state.incidents += 1;
    if (fatal) state.deaths += 1;
    state.safety = clamp(state.safety - (fatal ? 14 : 7), 0, 100);
    state.morale = clamp(state.morale - (fatal ? 17 : 7), 0, 100);
    state.reputation = clamp(state.reputation - (fatal ? 13 : 5), 0, 100);
    state.legalRisk = clamp(state.legalRisk + (fatal ? 18 : 5), 0, 100);
    state.pressure = clamp(state.pressure + 7, 0, 100);
    state.financeFlow.admin += cost; state.financeFlow.weeklyAdmin += cost; state.financeFlow.weeklyOut += cost; state.financeFlow.monthlyOut += cost;
    scheduleNextAccident();
    flashEvent(fatal ? "산재 사망 발생" : "산재처리", `비용 -${money(cost)} / 산재 ${state.incidents}건`);
    addToast(`${fatal ? "사망 사고" : "산재"} 처리 비용 ${money(cost)} 발생.`);
    checkEndStates();
  }
  function legalAudit() {
    const cost = Math.round(210_000_000 + state.legalRisk * 4_000_000 + rand(0, 110_000_000));
    state.cash -= cost;
    state.legalRisk = clamp(state.legalRisk - 5, 0, 100);
    state.reputation = clamp(state.reputation - 5, 0, 100);
    state.pressure = clamp(state.pressure + 4, 0, 100);
    flashBanner("노무/세무 감사", `자료 제출과 과태료 -${money(cost)}`);
    addToast(`감사 대응으로 ${money(cost)} 지출.`);
  }
  function vendorFreeze() {
    const loss = Math.round(170_000_000 + state.payables * 0.034);
    state.receivables = Math.max(0, state.receivables - loss * 0.45);
    state.cash -= loss;
    state.vendorTrust = clamp(state.vendorTrust + 6, 0, 100);
    state.pressure = clamp(state.pressure + 5, 0, 100);
    flashBanner("협력사 납품 중단", `라인 재개 비용 -${money(loss)}`);
    addToast(`협력사 공급 중단. 급한 불 ${money(loss)}.`);
  }
  function qualityRecall() {
    const cost = Math.round(240_000_000 + deptLevel("factory") * 42_000_000 + rand(0, 75_000_000));
    state.cash -= cost;
    state.receivables = Math.max(0, state.receivables - cost * 0.58);
    state.reputation = clamp(state.reputation - 8, 0, 100);
    state.pressure = clamp(state.pressure + 3, 0, 100);
    flashBanner("품질 클레임", `재작업/환입 손실 -${money(cost)}`);
    addToast(`QC가 버티지 못했다. 클레임 비용 ${money(cost)}.`);
  }

  function equityEstimate() {
    return state.cash + state.receivables + 2_800_000_000 - state.payables - state.debt;
  }
  function debtRatioEstimate() {
    const eq = Math.max(1, equityEstimate());
    return Math.round((state.debt + state.payables) / eq * 100);
  }
  function checkEndStates() {
    if (state.flags.gameOver || state.flags.stabilized) return;
    const equity = equityEstimate();
    const debtRatio = debtRatioEstimate();
    const promptDue = !state.flags.lastBankruptcyPrompt || state.day - state.flags.lastBankruptcyPrompt > 30;
    if (promptDue && (state.cash < -500_000_000 || equity < 0 || debtRatio > 420)) {
      state.flags.lastBankruptcyPrompt = state.day;
      state.paused = true;
      openBankruptcyPrompt(equity < 0 ? "자본잠식 통보" : debtRatio > 420 ? "은행 신용도 강등" : "부실 연락");
      return;
    }
    if (state.cash < -1_800_000_000 || state.morale <= 0 || state.deaths >= 4) {
      openEnding("파산 엔딩", "부도와 지급불능 통보가 이어졌습니다.");
      return;
    }
  }

  function openEnding(title, msg) {
    state.flags.gameOver = true;
    state.paused = true;
    showModal(`<div class="modal-header"><h2>${escapeHtml(title)}</h2><p>${escapeHtml(msg)}</p></div>
      <div class="modal-body">
        <div class="mini-table">
          <div class="mini-cell"><label>생존</label><strong>${state.day}일</strong></div>
          <div class="mini-cell"><label>출고</label><strong>${state.assembly.shipments}대</strong></div>
          <div class="mini-cell"><label>현금</label><strong>${money(state.cash)}</strong></div>
          <div class="mini-cell"><label>채권</label><strong>${money(state.receivables)}</strong></div>
        </div>
        <p class="intro-line">당신은 ${state.day}일동안 살아남으셨습니다!</p>
        <div class="modal-actions"><button id="newRunBtn">새 회사</button></div>
      </div>`);
    document.getElementById("newRunBtn").addEventListener("click", () => resetGame(true));
  }

  function openBankruptcyPrompt(reason) {
    showModal(`<div class="modal-header"><h2>${escapeHtml(reason)}</h2><p>은행과 거래처에서 부실 연락이 오기 시작했습니다. 파산하시겠습니까?</p></div>
      <div class="modal-body"><div class="mini-table">
        <div class="mini-cell"><label>자본</label><strong>${money(equityEstimate())}</strong></div>
        <div class="mini-cell"><label>부채비율</label><strong>${debtRatioEstimate()}%</strong></div>
        <div class="mini-cell"><label>미지급</label><strong>${money(state.payables)}</strong></div>
        <div class="mini-cell"><label>현금</label><strong>${money(state.cash)}</strong></div>
      </div><div class="modal-actions"><button id="declareBankruptcy">파산한다</button><button id="keepGoing">한 달 더 버틴다</button></div></div>`);
    document.getElementById("declareBankruptcy").addEventListener("click", () => openEnding("파산 엔딩", "부실, 도산, 지급불능 통보를 받고 회사를 접었습니다."));
    document.getElementById("keepGoing").addEventListener("click", () => { closeModal(); state.paused = false; state.pressure = clamp(state.pressure + 8, 0, 100); state.vendorTrust = clamp(state.vendorTrust - 4, 0, 100); renderDirty = true; });
  }

  function buyDept(key) {
    if (modalOpen || state.flags.gameOver || state.flags.stabilized) return;
    const d = state.depts[key];
    if (!d || !d.unlocked) return;
    const cost = deptCost(key);
    if (state.cash < cost) {
      addToast(`${deptDefs[key].name} 조정금 부족. 필요: ${money(cost)}`);
      return;
    }
    state.cash -= cost;
    d.level += 1;
    state.morale = clamp(state.morale + (key === "office" ? 4 : 1), 0, 100);
    state.safety = clamp(state.safety + (key === "office" || key === "procurement" || key === "design" ? 3 : 0), 0, 100);
    state.pressure = clamp(state.pressure - (key === "api" || key === "finance" || key === "design" ? 3 : 1), 0, 100);
    if (key === "vendor") state.payables += 180_000_000;
    addToast(`${deptDefs[key].name} Lv.${d.level} 조정 완료. 비용 ${money(cost)}.`);
    renderDirty = true;
    maybeUnlocks();
  }

  function useAction(key) {
    if (modalOpen || state.flags.gameOver || state.flags.stabilized) return;
    const def = actionDefs[key];
    if (!def || state.cooldowns[key] > 0) return;
    const ok = def.run();
    if (ok === false) return;
    state.cooldowns[key] = def.cdDays;
    renderDirty = true;
    checkEndStates();
  }

  function renderHUD() {
    const brandEl = document.getElementById("companyBrand");
    if (brandEl) brandEl.textContent = "이번 달까지만 버텨주세요";
    document.getElementById("clock").textContent = dateText();
    const survival = calcSurvivalDays();
    const pill = document.getElementById("marginPill");
    pill.classList.toggle("bad", survival < 20);
    pill.classList.toggle("warn", survival >= 20 && survival < 60);
    pill.textContent = `생존 ${state.day}일차`;
    const routeEl = document.getElementById("routePill");
    const shortRoute = state.flags?.overseasCountdown ? `${state.route} D-${state.flags.overseasCountdown}` : state.route;
    routeEl.textContent = shortRoute;
    routeEl.title = state.company ? `${companyFullName()} · ${shortRoute}` : shortRoute;

    const cashEl = document.getElementById("cashVal");
    cashEl.textContent = money(state.cash);
    cashEl.className = state.cash >= 0 ? "positive" : "negative";
    const cashDeltaEl = document.getElementById("cashDelta");
    cashDeltaEl.textContent = `어제 ${signedMoney(state.todayCashDelta)}`;
    cashDeltaEl.className = signClass(state.todayCashDelta);
    document.getElementById("arVal").textContent = money(state.receivables);
    const apEl = document.getElementById("apVal");
    apEl.textContent = money(state.payables);
    apEl.className = impactClass(state.payables);
    const debtEl = document.getElementById("debtVal");
    debtEl.textContent = money(state.debt);
    debtEl.className = impactClass(state.debt);
    const interest = calcInterestDaily();
    const interestEl = document.getElementById("interestVal");
    interestEl.textContent = `이자 ${money(interest)}/일`;
    interestEl.className = impactClass(interest);
    const burn = estimateMonthlyBurn();
    const burnEl = document.getElementById("burnVal");
    burnEl.textContent = money(burn);
    burnEl.className = burn <= 0 ? "positive" : impactClass(burn);
    const burnHint = document.getElementById("burnHint");
    burnHint.textContent = largeVariance(burn) ? "큰 비용" : "예상 월 지출";
    burnHint.className = burn <= 0 ? "positive" : impactClass(burn);
    const staff = state.workforce || { total: 62, partners: 27 };
    document.getElementById("staffVal").textContent = `${staff.total}명`;
    document.getElementById("partnerVal").textContent = `협력사 ${staff.partners}곳`;
    const pEl = document.getElementById("pressureVal");
    pEl.textContent = pct(state.pressure);
    pEl.className = state.pressure > 75 ? "negative" : state.pressure > 55 ? "warning" : "ink";
    document.getElementById("riskVal").textContent = `분쟁 ${Math.round(state.legalRisk)} / 사기 ${Math.round(state.morale)}`;

    document.querySelectorAll(".speed-btn[data-speed]").forEach(btn => btn.classList.toggle("active", Number(btn.dataset.speed) === state.speed));
    document.getElementById("pauseBtn").textContent = state.paused ? "▶" : "⏸";
  }


  function attr(s) { return escapeHtml(s == null ? "" : String(s)); }

  function safeImg(src, cls = "", alt = "") {
    const first = assetCandidates(src)[0] || "";
    return `<img${cls ? ` class="${attr(cls)}"` : ""} src="${attr(first)}" alt="${attr(alt)}" draggable="false" data-asset-src="${attr(src)}" data-fallback-index="0" onerror="window.AssetFallback&&window.AssetFallback(this)" />`;
  }

  function roomBgImg(src) {
    const first = assetCandidates(src)[0] || "";
    return `<img class="room-bg" src="${attr(first)}" alt="" draggable="false" loading="eager" decoding="sync" data-asset-src="${attr(src)}" data-fallback-index="0" onerror="window.AssetFallback&&window.AssetFallback(this)" />`;
  }

  function bgCss(src) {
    return assetCandidates(src).map(u => `url("${u.replace(/"/g, '\\"')}")`).join(", ");
  }

  function renderLeftRail() {
    const nav = document.getElementById("roomNav");
    nav.innerHTML = Object.entries(roomDefs).map(([key, room]) => `
      <button class="room-btn ${state.currentRoom === key ? "active" : ""}" data-room="${key}">
        <span class="nav-icon">${safeImg(room.icon)}</span>
        <span><b>${room.short}</b><small>${room.mood}</small></span>
      </button>
    `).join("");
    nav.querySelectorAll("[data-room]").forEach(btn => btn.addEventListener("click", () => {
      state.currentRoom = btn.dataset.room;
      lastRoomStageSig = "";
      renderDirty = true;
    }));

    const actions = document.getElementById("actions");
    actions.innerHTML = Object.entries(actionDefs).map(([key, def]) => {
      const cd = state.cooldowns[key] || 0;
      const fill = cd > 0 ? `${Math.round(cd / def.cdDays * 100)}%` : "0%";
      return `<div class="action-card ${def.tone}" title="${escapeHtml(def.sub)}">
        <span class="action-icon">${safeImg(def.icon)}</span>
        <span><div class="action-name">${def.title}</div><div class="action-sub">${def.sub}</div></span>
        <button data-action="${key}" ${cd > 0 ? "disabled" : ""}>${cd > 0 ? cd + "일" : "실행"}</button>
        <div class="cooldown-bar"><div class="cooldown-fill" style="width:${fill}"></div></div>
      </div>`;
    }).join("");
    actions.querySelectorAll("[data-action]").forEach(btn => btn.addEventListener("click", () => useAction(btn.dataset.action)));
  }

  function roomKpiInner() {
    return `
      <div class="floating-kpi"><label>안전</label><strong class="${state.safety < 45 ? "negative" : state.safety < 65 ? "warning" : "positive"}">${Math.round(state.safety)}</strong></div>
      <div class="floating-kpi"><label>사기</label><strong class="${state.morale < 35 ? "negative" : state.morale < 55 ? "warning" : "positive"}">${Math.round(state.morale)}</strong></div>
      <div class="floating-kpi"><label>평판</label><strong>${Math.round(state.reputation)}</strong></div>
      <div class="floating-kpi"><label>산재/사망</label><strong>${state.incidents}/${state.deaths}</strong></div>`;
  }

    const configs = {
      field: [
        {type:"cat", path:"path-a", left:8, bottom:46, delay:0.0}, {type:"dog", path:"path-b", left:24, bottom:58, delay:0.8},
        {type:"owl", path:"path-d", left:39, bottom:51, delay:1.4}, {type:"cat", path:"path-c", left:55, bottom:62, delay:0.5},
        {type:"dog", path:"path-a", left:70, bottom:49, delay:1.9}, {type:"owl", path:"path-d", left:86, bottom:57, delay:2.4}
      ],
      assembly: [
        {type:"cat", path:"path-c", left:9, bottom:44, delay:0.0}, {type:"dog", path:"path-a", left:24, bottom:59, delay:0.5},
        {type:"owl", path:"path-d", left:37, bottom:48, delay:1.0}, {type:"cat", path:"path-b", left:50, bottom:64, delay:1.5},
        {type:"dog", path:"path-c", left:63, bottom:47, delay:2.0}, {type:"owl", path:"path-d", left:76, bottom:61, delay:2.5},

      ],

      ],
      design: [
        {type:"cat", path:"path-c", left:10, bottom:48, delay:0.6}, {type:"owl", path:"path-d", left:28, bottom:62, delay:1.4},

      ]
    };

      const src = assetCandidates(srcMap[w.type])[0] || srcMap[w.type];
      const style = `left:${w.left}%;bottom:${w.bottom}%;animation-delay:${w.delay}s;`;
      return `<img class="worker ${w.path}" src="${attr(src)}" alt="" draggable="false" style="${style}" data-asset-src="${attr(srcMap[w.type])}" data-fallback-index="0" onerror="window.AssetFallback&&window.AssetFallback(this)" />`;
    }).join("")}</div>`;

  function currentRoomBody() {
    if (state.currentRoom === "field") return renderFieldStage();
    if (state.currentRoom === "assembly") return renderAssemblyStage();
    if (state.currentRoom === "office") return renderOfficeStage();
    if (state.currentRoom === "design") return renderDesignStage();
    return "";
  }

  function renderRoomStage() {
    if (state.flags?.overseasComplete) { roomDefs.field.name = "베트남 현장"; roomDefs.assembly.name = "베트남 조립실"; }
    const room = roomDefs[state.currentRoom];
    const root = document.getElementById("roomStage");
    root.style.setProperty("--room-bg", bgCss(room.bg));
    const body = currentRoomBody();

    // The v3 flicker came from rebuilding the full <img> background every simulated hour.
    // Keep the background node stable; update only KPI/body overlays unless the player changes rooms.
    if (root.dataset.room !== state.currentRoom) {
      root.dataset.room = state.currentRoom;
      root.innerHTML = `
        ${roomBgImg(room.bg)}
        <div class="room-shade ${state.currentRoom === "field" ? "" : "light"}"></div>
        <div class="room-title-card"><h1>${room.name}</h1><p>${room.desc}</p></div>
        <div id="roomKpis" class="room-kpis">${roomKpiInner()}</div>
        <div id="roomBody">${body}</div>
        ${renderWorkerLayer()}
      `;
    } else {
      const kpis = document.getElementById("roomKpis");
      const bodyEl = document.getElementById("roomBody");
      if (kpis) kpis.innerHTML = roomKpiInner();
      if (bodyEl) bodyEl.innerHTML = body;
    }
  }

  function renderFieldStage() {
    const util = clamp(42 + deptLevel("factory") * 9 + state.pressure * 0.22, 0, 100);
    const safety = state.safety;
    const maint = clamp(38 + deptLevel("procurement") * 10 + deptLevel("design") * 5 - state.pressure * 0.18, 0, 100);
    const backlog = Math.round((state.receivables / 100_000_000) + deptLevel("sales") * 3);
    return `<div class="field-floor">
      <div class="floor-card"><b>MCT · CNC 감시</b><span>투자가 아니라 눈을 떼면 작업자가 바로 느슨해진다.</span><div class="mini-progress"><i style="width:${util}%"></i></div></div>
      <div class="floor-card"><b>버튼맨 관리</b><span>작업은 켜져 있어도 보고는 모르는 척할 수 있다.</span><div class="mini-progress"><i style="width:${clamp(util-8,0,100)}%"></i></div></div>
      <div class="floor-card"><b>공구 아껴쓰기</b><span>공구와 소재를 잘라 쓰며 버틴다. 대신 불량률이 오른다.</span><div class="mini-progress"><i style="width:${maint}%"></i></div></div>
      <div class="floor-card"><b>작업 대기</b><span>${backlog}개 묶음 대기. 많으면 매출 후보, 너무 많으면 압박이다.</span><div class="mini-progress"><i style="width:${clamp(backlog*4,0,100)}%"></i></div></div>
    </div>`;
  }

  function batchCells(done, previousDone) {
    const cells = [];
    for (let i = 1; i <= 12; i++) {
      let cls = "";
      if (i <= done) cls = "done";
      else if (previousDone && i === done + 1) cls = "work";
      cells.push(`<div class="machine-cell ${cls}">${i}</div>`);
    }
    return cells.join("");
  }
  function renderAssemblyStage() {
    const a = state.assembly;
    syncIdleLots();
    const item = (name, count, cap=12, hot=false) => `<div class="flow-card ${hot ? "hot" : ""}"><b>${name}</b><strong>${count}/${cap}</strong><div class="flow-bar"><i style="width:${clamp(count / cap * 100, 0, 100)}%"></i></div></div>`;
    return `<div class="assembly-flow">
      ${item("수주", a.orderBacklog || 0, Math.max(12, a.orderBacklog || 0), (a.orderBacklog || 0) > assemblyMonthlyCap())}
      ${item("프레임", a.frame || 0)}
      ${item("아쎄이", a.assy || 0)}
      ${item("PLC/전장", a.plc || 0)}
      ${item("QC", a.qc || 0)}
      ${item("Idle/출고", a.idle || 0, 12, (a.idle || 0) > 0)}
    </div>`;
  }
  function renderOfficeStage() {
    return `<div class="desk-metrics" style="margin-top: 54%;">

  function monthlySalesForecast() { return 12 * 58_000_000; }
  function calcDailyOrders() {

    const priceDrag = Math.max(0.70, 1 - (state.flags?.pricePressure || 0) * 0.06);
    return Math.round(monthlySalesForecast() / 30 * reputation * priceDrag);
  }
  function calcDailyDemandUnits() {
    let chance = state.routeKey === "growth" ? 0.55 : 0.42;
    chance += Math.max(0, state.reputation - 55) * 0.004;
    chance -= (state.flags?.pricePressure || 0) * 0.05;
    chance = clamp(chance, 0.18, 0.70);
    let units = Math.random() < chance ? 1 : 0;
    if (state.routeKey === "growth" && Math.random() < 0.10) units += 1;
    return units;
  }
  function calcDailyCostBreakdown(orders = calcDailyOrders()) {
    const late = state.workShift && state.workShift.end > 19 * 60;
    const productionPeople = (state.workforce.field || 0) + (state.workforce.assembly || 0);
    const koreaPeople = (state.workforce.office || 0) + (state.workforce.design || 0);
    const productionWage = state.flags?.overseasComplete ? VIETNAM_COMPANY_WAGE : COMPANY_MONTHLY_WAGE;
    let payroll = Math.round(((productionPeople * productionWage) + (koreaPeople * COMPANY_MONTHLY_WAGE) + (state.owner?.salary || 8_000_000)) / WORKDAYS_PER_MONTH);

    if (state.workShift?.saturday) payroll *= 1.35;
    const overOrders = Math.max(0, (state.assembly?.orderBacklog || 0) - 12);
    const overFrame = Math.max(0, (state.assembly?.frame || 0) - 12);
    let outsource = 13_000_000 + Math.max(0, state.pressure - 55) * 250_000 + (overOrders + overFrame) * 1_900_000;

  }

  function dailyUpdate() {

    if ((state.assembly.orderBacklog || 0) > 12) {
      state.assembly.rushDays = Math.max(state.assembly.rushDays || 0, 6);
      if ((state.assembly.orderBacklog || 0) >= 16) setOvertime(24, "철야"); else setOvertime(21, "잔업");
    }

    if (state.routeKey === "overseas" && state.day > 28) collected += Math.min(state.receivables - collected, 20_000_000 + deptLevel("api") * 3_000_000);
    state.receivables -= collected;
    state.cash += collected;
    const costBreakdown = calcDailyCostBreakdown(calcDailyOrders());
    const operatingCost = costBreakdown.payroll + costBreakdown.outsource + costBreakdown.overhead;
    state.cash -= operatingCost;
    const payableAccrual = Math.round(costBreakdown.materials + costBreakdown.outsource * 0.55);
    state.payables += payableAccrual;
    const apDailyRate = 1 / Math.round(rand(180, 365));
    const apPayment = Math.min(state.payables, Math.round(state.payables * apDailyRate));
    state.payables -= apPayment;
    state.cash -= apPayment;
    const interest = Math.round(calcInterestDaily());
    state.cash -= interest;
    state.financeFlow.weeklyIn += collected;
    state.financeFlow.weeklyOut += operatingCost + apPayment + interest;
    state.financeFlow.monthlyIn += collected;
    state.financeFlow.monthlyOut += operatingCost + apPayment + interest;
    state.financeFlow.payroll += costBreakdown.payroll;
    state.financeFlow.outsource += costBreakdown.outsource;
    state.financeFlow.vendors = (state.financeFlow.vendors || 0) + costBreakdown.vendors;
    state.financeFlow.snacks = (state.financeFlow.snacks || 0) + costBreakdown.snacks;
    state.financeFlow.admin = (state.financeFlow.admin || 0) + costBreakdown.admin;

    state.financeFlow.weeklySnacks = (state.financeFlow.weeklySnacks || 0) + costBreakdown.snacks;
    state.financeFlow.weeklyAdmin = (state.financeFlow.weeklyAdmin || 0) + costBreakdown.admin;
    state.financeFlow.materials += payableAccrual;
    state.financeFlow.overhead += costBreakdown.overhead;
    state.financeFlow.apPaid += apPayment;
    state.financeFlow.interest += interest;

  const MANUFACTURING_COST_RATIO_BASE_V4417 = 0.75;

  function manufacturingCostRatio() {
    return clamp(
      MANUFACTURING_COST_RATIO_BASE_V4417 + rand(-MANUFACTURING_COST_RATIO_SPREAD_V4417, MANUFACTURING_COST_RATIO_SPREAD_V4417),

  function equipmentCostFromSales(value) {

  function equipmentRevenueForUnits(units = 1) {

  function randomIdleDays() {

  function seedIdleLots(qty = 0) {

  }

  function syncIdleLots() {
    const a = state.assembly || {};
    const source = Array.isArray(a.idleLots) ? a.idleLots : [];
    const normalized = [];
    for (const lot of source) {
      const qty = Math.max(0, Math.round(lot.qty || 0));
      const baseDays = Number.isFinite(Number(lot.days)) ? Math.round(Number(lot.days)) : randomIdleDays();
      for (let i = 0; i < qty; i += 1) normalized.push({ qty: 1, days: baseDays });
    }
    if (!normalized.length && (a.idle || 0) > 0) normalized.push(...seedIdleLots(a.idle));
    a.idleLots = normalized.filter(l => l.qty > 0);
    a.idle = a.idleLots.length;
  }

  function pushIdleLot(qty = 1, days = null) {
    const a = state.assembly;
    a.idleLots = a.idleLots || [];
    const count = Math.max(0, Math.round(qty || 0));
    for (let i = 0; i < count; i += 1) a.idleLots.push({ qty: 1, days: days == null ? randomIdleDays() : Math.max(0, Math.round(days)) });
    syncIdleLots();

  function dailyShipmentLimit() {

    if ((state.assembly.rushDays || 0) > 0 || state.workShift?.end >= 24 * 60) return 6;
    if (state.workShift?.end >= 21 * 60 || state.pressure > 70) return 2;
    return Math.random() < 0.25 ? 2 : 1;
  }

  function advanceIdleLots() {
    const a = state.assembly;

    for (const lot of a.idleLots) lot.days -= 1;
    const dayInMonth = ((state.day - 1) % 30) + 1;
    if (dayInMonth >= 25 && (a.monthMade || 0) < 12) {
      for (const lot of a.idleLots) lot.days = Math.min(lot.days, 0);
    }
    let shipLimit = Math.min(dailyShipmentLimit(), Math.max(0, assemblyMonthlyCap() - (a.monthMade || 0)));
    let shipped = 0;
    a.idleLots.sort((x, y) => x.days - y.days);
    for (const lot of a.idleLots) {
      if (shipLimit <= 0) break;
      if (lot.days > 0) continue;
      lot.qty -= 1;
      shipped += 1;
      shipLimit -= 1;

    a.idleLots = a.idleLots.filter(l => l.qty > 0);

    const a = state.assembly;
    syncIdleLots();
    const lack = Math.max(0, target - (a.monthMade || 0));
    if (lack <= 0) return;
    for (const lot of a.idleLots) lot.days = Math.min(lot.days, 0);
    advanceIdleLots();
    if ((a.monthMade || 0) < target) {
      const remain = target - (a.monthMade || 0);
      a.orderBacklog = (a.orderBacklog || 0) + remain;
      state.pressure = clamp(state.pressure + remain * 2, 0, 100);
      flashEvent("월말 출고 부족", `12대 목표 중 ${remain}대가 남았다. 다음 달 강제 잔업으로 넘어간다.`);
    }
  }

  function advanceAssembly() {
    const a = state.assembly;
    normalizeOrderBalance(state);
    a.lastMade = 0; a.assy ??= 0; a.plc ??= 0; a.qc ??= 0;
    syncIdleLots();
    advanceIdleLots();
    let rate = calcAssemblyRate();
    if ((a.orderBacklog || 0) > 12) rate *= 1.45;
    if ((a.orderBacklog || 0) >= 16) rate *= 1.25;
    a.progress += rate;
    const cap = Math.max(12, assemblyMonthlyCap() + 1, (a.orderBacklog || 0) > 12 ? 16 : 12);
    let moves = 0;
    while (a.progress >= 1 && moves < 20) {
      a.progress -= 1; moves += 1;
      if ((a.qc || 0) > 0 && (a.idle || 0) < cap) {
        a.qc -= 1;
        if (Math.random() < calcDefectRate()) { a.rework += 1; a.assy += 1; state.pressure = clamp(state.pressure + 0.7, 0, 100); }
        else pushIdleLot(1);
      } else if ((a.plc || 0) > 0 && (a.qc || 0) < cap) {
        a.plc -= 1; a.qc += 1;
      } else if ((a.assy || 0) > 0 && (a.plc || 0) < cap) {
        a.assy -= 1; a.plc += 1;
      } else if ((a.frame || 0) > 0 && (a.assy || 0) < cap) {
        a.frame -= 1; a.assy += 1;
      } else if ((a.orderBacklog || 0) > 0 && (a.frame || 0) < cap) {
        a.orderBacklog -= 1; a.frame += 1;
      } else break;
    }
  }

  function inventoryValue() {
    const a = state.assembly || {};
    return Math.round(((a.frame||0) * 12_000_000) + ((a.assy||0) * 22_000_000) + ((a.plc||0) * 32_000_000) + ((a.qc||0) * 40_000_000) + ((a.idle||0) * 45_000_000));
  }

  function manufacturingCostStatement() {
    const cogs = state.financeFlow.cogs || 0;
    return { materials: Math.round(cogs * 0.52), labor: Math.round(cogs * 0.18), outsource: Math.round(cogs * 0.20), overhead: Math.round(cogs * 0.10) };
  }

  function init() {
    preloadImages();
    state = loadGame() || createDefaultState();
    planWorkShift();
    wireControls();
    renderAll();
    showIntroIfNew();
    requestAnimationFrame(gameLoop);
  }

  init();
})();
</script>
